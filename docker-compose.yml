version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: orcamentos_db
    restart: always
    environment:
      POSTGRES_USER: orcamentos
      POSTGRES_PASSWORD: orcamentos123
      POSTGRES_DB: orcamentos_metalicos
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: orcamentos_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://orcamentos:orcamentos123@postgres:5432/orcamentos_metalicos
      JWT_SECRET: super_secret_jwt_key_change_in_production
      PORT: 3001
    ports:
      - '3001:3001'
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: orcamentos_frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
